<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>폐유고상 QR 코드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f4f6f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}

.card{background:white;border-radius:16px;border:1px solid #e8ecf0;padding:2.5rem 2rem;max-width:400px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08);}

/* 배지 */
.badge{display:inline-block;background:#0f2744;color:white;font-size:12px;font-weight:700;padding:5px 16px;border-radius:5px;letter-spacing:0.8px;margin-bottom:18px;}

/* 제목 */
.title{font-size:24px;font-weight:900;color:#0f2744;margin-bottom:10px;line-height:1.3;}
.subtitle{font-size:15px;color:#374151;font-weight:500;line-height:1.6;margin-bottom:28px;}
.subtitle strong{color:#0f2744;font-weight:700;}

/* QR 영역 */
.qr-wrap{background:#f8fafc;border-radius:12px;padding:24px;margin-bottom:20px;display:inline-block;width:100%;}
#qrcode{display:flex;justify-content:center;}
#qrcode canvas,#qrcode img{border-radius:4px;}
.qr-url{font-size:11px;color:#9ca3af;margin-top:12px;word-break:break-all;}

/* 사용 방법 */
.how{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:18px 20px;margin-bottom:24px;text-align:left;}
.how-title{font-size:14px;font-weight:700;color:#1e40af;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.how-title svg{flex-shrink:0;}
.how-list{display:flex;flex-direction:column;gap:8px;}
.how-item{display:flex;align-items:flex-start;gap:10px;}
.how-num{width:22px;height:22px;background:#1d4ed8;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;}
.how-text{font-size:14px;color:#1e3a5f;font-weight:500;line-height:1.5;}

/* 버튼 */
.print-btn{width:100%;padding:15px;background:#0f2744;color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:0.3px;transition:background 0.15s;}
.print-btn:hover{background:#1e3a6e;}

@media print{
  body{background:white;padding:0;}
  .card{box-shadow:none;border:none;padding:1rem;max-width:100%;}
  .print-btn{display:none;}
}
</style>
</head>
<body>

<div class="card">
  <div class="badge">TC 폐기물 관리</div>

  <div class="title">폐유고상 배출 요청</div>
  <p class="subtitle">
    <strong>톤백 또는 링팩이 가득 차면</strong><br>
    QR 코드를 스캔하여 기록해주세요.
  </p>

  <div class="qr-wrap">
    <div id="qrcode"></div>
    <div class="qr-url">https://yjyeom1545.github.io/tc/waste-oil-form.html</div>
  </div>

  <div class="how">
    <div class="how-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      사용 방법
    </div>
    <div class="how-list">
      <div class="how-item">
        <div class="how-num">1</div>
        <div class="how-text">스마트폰 카메라로 QR 코드를 스캔합니다.</div>
      </div>
      <div class="how-item">
        <div class="how-num">2</div>
        <div class="how-text">내 라인을 선택합니다.</div>
      </div>
      <div class="how-item">
        <div class="how-num">3</div>
        <div class="how-text">봉투 유형(톤백 / 링팩)을 선택합니다.</div>
      </div>
      <div class="how-item">
        <div class="how-num">4</div>
        <div class="how-text">수량을 입력하고 전송합니다.</div>
      </div>
    </div>
  </div>

  <button class="print-btn" onclick="window.print()">인쇄하기</button>
</div>

<script>
new QRCode(document.getElementById('qrcode'), {
  text: 'https://yjyeom1545.github.io/tc/waste-oil-form.html',
  width: 220,
  height: 220,
  colorDark: '#0f2744',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
